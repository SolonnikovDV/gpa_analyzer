<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Детальный анализ функции</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='detailed.css') }}">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="/">Analyzer</a>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item"><a class="nav-link" href="/">Главная</a></li>
        <li class="nav-item"><a class="nav-link active" href="/detailed">Детальный анализ</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container my-4">
  <div class="row">
    <div class="col-lg-10 mx-auto">
      <!-- Блок для отображения ошибок -->
      <div id="errorAlert" class="alert alert-danger alert-dismissible fade show" role="alert" style="display: none;">
        <strong>Ошибка!</strong> <span id="errorMessage"></span>
        <button type="button" class="btn-close" onclick="this.parentElement.style.display='none'"></button>
      </div>

      <div class="card shadow-sm">
        <div class="card-header">Детальный пошаговый анализ функции</div>
        <div class="card-body">
          <form id="analysisForm" method="post" action="{{ url_for('detailed_discover') }}">
            <div class="mb-3">
              <label class="form-label">DDL функции (CREATE OR REPLACE FUNCTION ...)</label>
              <textarea name="ddl" class="form-control" rows="12" required placeholder="Вставьте полный текст функции"></textarea>
              <div class="form-text">Функция должна быть полной, включая тело.</div>
            </div>
            
            <hr>
            <h5>Настройки кластера</h5>
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label">Количество сегментов</label>
                <input type="number" class="form-control" name="segments" value="120">
              </div>
              <div class="col-md-6">
                <label class="form-label">RAM на сегмент (GB)</label>
                <input type="number" step="0.1" class="form-control" name="ram_per_seg_gb" value="153.6">
              </div>
            </div>
            
            <hr>
            <h5>Подключение к БД (для получения реальной статистики таблиц)</h5>
            <div class="form-check mb-3">
              <input class="form-check-input" type="checkbox" name="use_db_connection" id="use_db">
              <label class="form-check-label" for="use_db">
                Использовать реальное подключение для получения статистики таблиц
              </label>
            </div>
            
            <div id="db_fields" style="display: none;">
              <div class="row g-3">
                <div class="col-md-4">
                  <label class="form-label">Стенд</label>
                  <select class="form-select" name="stand_type">
                    {% for key in stands.keys() %}
                    <option value="{{ key }}">{{ key }}</option>
                    {% endfor %}
                  </select>
                </div>
                <div class="col-md-4">
                  <label class="form-label">Host</label>
                  <input type="text" class="form-control" name="host" placeholder="по умолчанию">
                </div>
                <div class="col-md-2">
                  <label class="form-label">Port</label>
                  <input type="number" class="form-control" name="port" placeholder="5432">
                </div>
                <div class="col-md-2">
                  <label class="form-label">DB</label>
                  <input type="text" class="form-control" name="dbname" placeholder="имя БД">
                </div>
                <div class="col-md-6">
                  <label class="form-label">Логин</label>
                  <input type="text" class="form-control" name="user" id="db_user">
                </div>
                <div class="col-md-6">
                  <label class="form-label">Пароль</label>
                  <input type="password" class="form-control" name="password" id="db_password">
                </div>
              </div>
            </div>
            
            <div class="text-end mt-4">
              <button class="btn btn-primary" type="submit" id="submitBtn">Обнаружить таблицы</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  const useDbCheck = document.getElementById('use_db');
  const dbFields = document.getElementById('db_fields');
  const userInput = document.getElementById('db_user');
  const passwordInput = document.getElementById('db_password');
  const submitBtn = document.getElementById('submitBtn');
  const errorAlert = document.getElementById('errorAlert');
  const errorMessage = document.getElementById('errorMessage');
  const form = document.getElementById('analysisForm');

  // Показ/скрытие полей БД
  useDbCheck.addEventListener('change', function() {
    dbFields.style.display = this.checked ? 'block' : 'none';
    validateForm();
  });

  // Валидация перед отправкой
  function validateForm() {
    if (useDbCheck.checked) {
      if (!userInput.value.trim() || !passwordInput.value.trim()) {
        errorMessage.textContent = 'Вы используете опцию подключения к БД. Проверьте введенный логин и пароль.';
        errorAlert.style.display = 'block';
        submitBtn.disabled = true;
        return false;
      }
    }
    errorAlert.style.display = 'none';
    submitBtn.disabled = false;
    return true;
  }

  // Валидация при изменении полей
  userInput.addEventListener('input', validateForm);
  passwordInput.addEventListener('input', validateForm);

  // Валидация перед отправкой формы
  form.addEventListener('submit', function(e) {
    if (!validateForm()) {
      e.preventDefault();
    }
  });

  // Сохранение данных формы в localStorage (кроме пароля)
  function saveFormData() {
    const formData = new FormData(form);
    for (let [key, value] of formData.entries()) {
      if (key !== 'password') {
        localStorage.setItem('detailed_' + key, value);
      }
    }
  }

  // Загрузка данных из localStorage
  function loadFormData() {
    document.querySelectorAll('input, select, textarea').forEach(el => {
      const key = 'detailed_' + el.name;
      const saved = localStorage.getItem(key);
      if (saved !== null && el.name !== 'password') {
        if (el.type === 'checkbox') {
          el.checked = (saved === 'on');
        } else {
          el.value = saved;
        }
      }
    });
    
    // Обновляем видимость полей БД
    if (useDbCheck) {
      dbFields.style.display = useDbCheck.checked ? 'block' : 'none';
    }
    
    // Проверяем валидацию после загрузки
    setTimeout(validateForm, 100);
  }

  // Сохраняем при изменении
  document.querySelectorAll('input, select, textarea').forEach(el => {
    el.addEventListener('input', saveFormData);
    el.addEventListener('change', function() {
      saveFormData();
      validateForm();
    });
  });

  // Загружаем при старте
  window.addEventListener('load', loadFormData);

  // Проверяем наличие ошибки в URL (если вернулись с ошибкой)
  const urlParams = new URLSearchParams(window.location.search);
  if (urlParams.get('error') === 'db_required') {
    errorMessage.textContent = 'Вы используете опцию подключения к БД. Проверьте введенный логин и пароль.';
    errorAlert.style.display = 'block';
  }
</script>
</body>
</html>
