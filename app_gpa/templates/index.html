<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Greenplum Function Analyzer — Web</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">Analyzer</a>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item"><a class="nav-link active" aria-current="page" href="/">Главная</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container my-4">
  <div class="row">
    <div class="col-lg-8 mx-auto">
      <div class="card shadow-sm">
        <div class="card-header">Запуск анализа функции</div>
        <div class="card-body">
          <form method="post" action="{{ url_for('start') }}">
            <div class="row g-3">
              <div class="col-md-4">
                <label class="form-label">Стенд</label>
                <select class="form-select" name="stand_type" id="stand_type" onchange="applyPreset()">
                  {% for key in stands.keys() %}
                  <option value="{{ key }}">{{ key }}</option>
                  {% endfor %}
                </select>
              </div>
              <div class="col-md-4">
                <label class="form-label">Host</label>
                <input type="text" class="form-control" name="host" id="host" placeholder="по умолчанию">
              </div>
              <div class="col-md-2">
                <label class="form-label">Port</label>
                <input type="number" class="form-control" name="port" id="port" placeholder="5432">
              </div>
              <div class="col-md-2">
                <label class="form-label">DB</label>
                <input type="text" class="form-control" name="dbname" id="dbname" placeholder="имя БД">
              </div>
              <div class="col-md-6">
                <label class="form-label">Логин</label>
                <input type="text" class="form-control" name="user" required>
              </div>
              <div class="col-md-6">
                <label class="form-label">Пароль</label>
                <input type="password" class="form-control" name="password" required>
              </div>
              <div class="col-md-6">
                <label class="form-label">Схема</label>
                <input type="text" class="form-control" name="schema" placeholder="enter_schema" required>
              </div>
              <div class="col-md-6">
                <label class="form-label">Функция</label>
                <input type="text" class="form-control" name="function" placeholder="enter_function_name" required>
              </div>
              <div class="col-md-12">
                <label class="form-label">Параметры функции (через запятую)</label>
                <input type="text" class="form-control" name="params" placeholder="enter sinature function param: example '16','true','180'">
              </div>
              <div class="col-md-12">
                <label class="form-label">Множители (JSON)</label>
                <input type="text" class="form-control" name="multipliers" placeholder='enter attribute name and multiplicator value: example {"card":2.0,"alls":3.0}'>
              </div>
            </div>
            <div class="text-end mt-3">
              <button class="btn btn-primary" type="submit">Запустить</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const PRESETS = {{ stands | tojson }};
function applyPreset() {
  const t = document.getElementById('stand_type').value;
  const p = PRESETS[t];
  document.getElementById('host').placeholder = p.host;
  document.getElementById('port').placeholder = p.port;
  document.getElementById('dbname').placeholder = p.dbname;
}
window.addEventListener('DOMContentLoaded', applyPreset);
</script>
</body>
</html>
